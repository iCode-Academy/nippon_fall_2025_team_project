<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Go</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/category.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="./picture/Layout/Foodie Go.png" alt="Foodie Go" style="cursor:pointer" onclick="goHome()">
        </div>
        <div class="header-center">
            <div class="deliveryBtn">
                <button id="delivery" class="active">
                    <img src="./picture/Layout/Delivery.png" alt=""> Delivery
                </button>
                <button id="pickup">
                    <img src="./picture/Layout/pickup-icon.png" alt=""> Pickup
                </button>
            </div>
            <div class="greenPoint" onclick="getLocation()" style="cursor:pointer;">
    <img src="./picture/Layout/location.png" alt="">
    <span id="addressDisplay">Your Location</span>
</div>
        </div>
        <div class="header-right">

            <!-- 🛒 CART ICON -->
            <!-- When user clicks this, cart popup will open -->
            <div class="basket-icon-wrapper" onclick="toggleCart()">
                <img src="./picture/Layout/Basket.png" alt="Basket" class="basket-img">

                <!-- Displays total number of items in cart -->
                <div id="basketCounter">0</div>

                <!-- 🧾 CART POPUP -->
                <div id="cartPopup" class="cart-popup"></div>
            </div>
            <div class="login">
                <button id="signIn" onclick="goToLogin()">
                    Sign in
                </button>
                <button id="createacc" onclick="goToRegister()">
                    Create account
                </button>
            </div>
        </div>
    </div>
    <div class="category-section">
        <div class="slider-outer-wrapper">
            <button id="prevBtn" class="nav-btn prev" onclick="scrollCats(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="category-container" id="catSlider">
                <div class="category-list" id="catDisplay">
                </div>
            </div>
            <button id="nextBtn" class="nav-btn next" onclick="scrollCats(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="catModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Manage Categories</h3>
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" id="nameInput" placeholder="Жишээ нь: Burgers">
            </div>
            <div class="form-group">
                <label>Select Icon</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <button class="btn-add" onclick="saveCategory()">Add Category</button>
            <div class="manage-list" id="manageList"></div>
        </div>
    </div>
    <div class="layout">
        <div class="switch-body">
            <div class="filter-container">
                <div class="filter-row">
                    <span class="filter-label">Open now</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="filter-row">
                    <span class="filter-label">Free delivery</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="filter-row rating-section">
                    <span class="filter-label">Rating</span>
                    <div class="stars">
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                    </div>

                </div>
            </div>

        </div>
        <div class="custom-search-wrapper">
            <div class="custom-search-container">
                <div class="custom-search-box">
                    <i class="fas fa-search custom-search-icon"></i>
                    <input type="text" placeholder="What you want to eat today?" class="custom-search-input">
                </div>

                <div class="custom-dropdown-box" onclick="toggleSortDropdown(event)">
                    <span class="custom-dropdown-text" id="sortLabel">Recommended</span>
                    <i class="fas fa-chevron-down custom-dropdown-icon"></i>


                    <div class="sort-popup" id="sortPopup" onclick="event.stopPropagation()">
                        <p class="sort-title">Sort by</p>
                        <label class="sort-option"><input type="radio" name="sort" value="recommended" checked>
                            Recommended</label>
                        <label class="sort-option"><input type="radio" name="sort" value="az"> Alphabetical order
                            (A–Z)</label>
                        <label class="sort-option"><input type="radio" name="sort" value="za"> Alphabetical order
                            (Z–A)</label>
                        <label class="sort-option"><input type="radio" name="sort" value="distance"> Distance</label>
                        <div class="sort-actions">
                            <button onclick="cancelSort(event)">Cancel</button>
                            <button class="apply-btn" onclick="applySort(event)">Apply</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="restaurant-list-wrapper">
                <iframe src="restaurantlist.html" id="restaurantIframe" class="restaurant-list-iframe" frameborder="0">
                </iframe>

            </div>
        </div>
    </div>
    <div id="validationPopup">
        <span id="validationMsg"></span>
    </div>

    <script src="./js/category.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/login.js"></script>
    <script src="./js/auth-ui.js"></script>
</body>

</html>
