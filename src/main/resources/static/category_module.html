<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Go - Categories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/category.css">
</head>
<body>

<div class="page-wrapper">
    <div class="category-section">
        <div class="slider-outer-wrapper">
            <!-- Зүүн сум -->
            <button id="prevBtn" class="nav-btn prev" onclick="scrollCats(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="category-container" id="catSlider">
                <div class="category-list" id="catDisplay">
                    <!-- Категориуд болон Add товч энд зурагдана -->
                </div>
            </div>

            <!-- Баруун сум -->
            <button id="nextBtn" class="nav-btn next" onclick="scrollCats(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- Manage Categories Modal -->
<div id="catModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Manage Categories</h3>
        
        <div class="form-group">
            <label>Category Name</label>
            <input type="text" id="nameInput" placeholder="Жишээ нь: Burgers">
        </div>
        <div class="form-group">
            <label>Select Icon</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <button class="btn-add" onclick="saveCategory()">Add Category</button>

        <!-- Өмнөх шиг жагсаалт энд гарч ирнэ -->
        <div class="manage-list" id="manageList"></div>
    </div>
</div>

<script src="./js/category.js"></script>
</body>
</html>
