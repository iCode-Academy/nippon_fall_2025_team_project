<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant</title>
    <link rel="stylesheet" href="./css/restaurant.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="./picture/Layout/Foodie Go.png" alt="Foodie Go" style="cursor:pointer" onclick="goHome()">
        </div>
        <div class="header-center">
            <div class="deliveryBtn">
                <button id="delivery" class="active">
                    <img src="./picture/Layout/Delivery.png" alt=""> Delivery
                </button>
                <button id="pickup">
                    <img src="./picture/Layout/pickup-icon.png" alt=""> Pickup
                </button>
            </div>
            <div class="greenPoint">
                <img src="./picture/Layout/location.png" alt="">
                <span id="addressNumber">136</span> Greenpoint Ave
            </div>
        </div>
        <div class="header-right">
            <!-- 🛒 CART ICON -->
            <!-- When user clicks this, cart popup will open -->
            <div class="basket-icon-wrapper" onclick="toggleCart()">
                <img src="./picture/Layout/Basket.png" alt="Basket" class="basket-img">
                <!-- Displays total number of items in cart -->
                <div id="basketCounter">0</div>
                <!-- 🧾 CART POPUP -->
                <div id="cartPopup" class="cart-popup"></div>
            </div>
            <!-- Testing button
            <button onclick="addToCart({id:1, name:'Burger', price:8.00})">
                Add Burger (TEST)
            </button>
            <button onclick="addToCart({id:2, name:'Sushi', price:15})">
                Add Sushi (TEST)
            </button> -->
            <div class="login">
                <button id="signIn" onclick="goToLogin()">
                    Sign in
                </button>
                <button id="createacc" onclick="goToRegister()">
                    Create account
                </button>
            </div>
        </div>
    </div>
    <div class="restaurant-layout">
        <div class="restaurant-page">
            <header class="restaurant-header">
                <div class="restaurant-banner">
                    <img id="restaurantBanner" src="./picture/Layout/no image.jpg">

                </div>
                <div class="restaurant-info">
                    <div class="restaurant-main-info">
                        <h1 id="restaurantName">
                            Restaurant Name
                        </h1>
                        <p id="restaurantCategory">
                            Sushi • Asian
                        </p>
                        <div class="restaurant-meta">
                            <span>
                                <i class="fas fa-star"></i>
                                4.8
                            </span>
                            <span>
                                <i class="fas fa-clock"></i>
                                20-30 min
                            </span>
                            <span>
                                <i class="fas fa-motorcycle"></i>
                                Free delivery
                            </span>
                        </div>
                    </div>
                    <button class="btn-add-food" id="addFoodBtn" onclick="toggleFoodModal(true)">
                        <i class="fas fa-plus"></i>
                        Add Food
                    </button>
                </div>
            </header>
            <section class="food-category-section">
                <div class="food-category-tabs" id="foodCategoryTabs">
                    <button class="food-tab active">
                        Popular
                    </button>
                    <button class="food-tab">
                        Sushi
                    </button>
                    <button class="food-tab">
                        Ramen
                    </button>
                    <button class="food-tab">
                        Drinks
                    </button>
                </div>
            </section>
            <main class="food-section">
                <div class="food-grid" id="foodGrid">
                </div>
            </main>
        </div>
        <div id="foodModalOverlay" class="modal-overlay" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="toggleFoodModal(false)">
                    &times;
                </span>
                <h2>Add Food</h2>
                <div class="modal-form-grid">
                    <div class="form-group full-width">
                        <label>Food name</label>
                        <input type="text" id="foodName">
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="foodPrice">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="foodCategory">
                            <option value="">
                                Category сонгоно уу
                            </option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="foodDescription"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Image</label>
                        <input type="file" id="foodImage">
                    </div>
                </div>
                <div class="modal-footer-btns">
                    <button class="btn-save" onclick="validateAndSaveFood()">
    Save
</button>
                    </button>
                    <button class="btn-cancel" onclick="toggleFoodModal(false)">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/restaurant.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/auth-ui.js"></script>
</body>

</html>
