<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/checkout.css">
</head>

<body>
    <div class="checkout-container">

        <!-- LEFT -->
        <div class="checkout-left">
            <h2>Your Order</h2>
            <div id="cartItems"></div>
        </div>

        <!-- RIGHT -->
        <div class="checkout-right">
            <h2>Delivery Info</h2>
            <input id="receiverName" placeholder="Receiver Name" />
            <input id="receiverPhone" placeholder="Receiver Phone Number" />
            <input id="city" placeholder="City" />
            <input id="district" placeholder="District" />
            <input id="apartment" placeholder="Apartment" />
            <input id="roomNumber" placeholder="Room Number" />
            <div id="totalPrice"></div>
            <button id="placeOrderBtn">Place Order</button>
        </div>

    </div>
    <script src="js/checkout.js"></script>
</body>

</html>
