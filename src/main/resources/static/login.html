<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodieGo — Sign In</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🍣</div>
      <div class="logo-text">Foodie<span>Go</span></div>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Please sign in to your account</p>

    <div id="msg" class="msg"></div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <div class="divider">or</div>

    <div class="register-link">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter your email and password.';
        return;
      }

      btn.textContent = 'Signing in...';
      btn.classList.add('loading');

      try {
        // URL нь таны Backend-ийн порттой (8080) яг таарах ёстой
        const res = await fetch('http://localhost:8080/api/user/login', {
          method: 'POST', // Энэ метод нь Backend-ийн @PostMapping-той таарах ёстой
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
      throw new Error("Login failed");
    }
 
    const user = await res.json();

    // hadgalna
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("userId", user.id);
    localStorage.setItem("userName", user.name);

    msg.className = 'msg success';
    msg.textContent = "Login successful! Redirecting...";
 
    setTimeout(() => {
      const redirect = localStorage.getItem("redirectAfterLogin");

      if (redirect) {
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = redirect;
      } else {
        window.location.href = 'index.html';
      }
    }, 1000);

      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Failed to connect to the server.';
      } finally {
        btn.textContent = 'Sign In';
        btn.classList.remove('loading');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>

</html>
