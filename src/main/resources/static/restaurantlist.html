<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management</title>
    <link rel="stylesheet" href="./css/restaurantlist.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="layout">
        <div class="layout-header">
            <h2>Order from <span id="resCount">0</span> places</h2>
            <button class="btn-add-main" onclick="toggleModal(true)">
                <i class="fas fa-plus"></i> Add New Restaurant
            </button>
        </div>

        <div class="layout-body">
            <div id="restaurantList" class="res-list-container">
            </div>
        </div>
    </div>

    <div id="validationPopup">
        <i class="fas fa-exclamation-circle"></i>
        <span id="validationMsg"></span>
    </div>

    <script src="./js/restaurantlist.js"></script>
</body>

</html>
