<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management</title>
    <link rel="stylesheet" href="./css/restaurantlist.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="layout">
        <div class="layout-header">
            <h2>
                Order from <span id="resCount">0</span> places
            </h2>
            <button id="addRestaurantBtn" class="btn-add-main" onclick="toggleModal(true)">
                <i class="fas fa-plus"></i>
                Add New Restaurant
            </button>
        </div>
        <div class="layout-body">
            <div id="restaurantList" class="res-list-container"></div>
        </div>
    </div>
    <div id="validationPopup">
        <i class="fas fa-exclamation-circle"></i>
        <span id="validationMsg"></span>
    </div>
    <!-- MODAL -->
    <div id="resModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="toggleModal(false)">
                &times;
            </span>
            <h2>Шинэ ресторан нэмэх</h2>
            <div class="modal-form-grid">
                <div class="form-group">
                    <label>Рестораны нэр</label>
                    <input type="text" id="resName">
                </div>
                <div class="form-group">
                    <label>Утас</label>
                    <input type="text" id="resPhone">
                </div>
                <div class="form-group full-width">
                    <label>Category</label>
                    <select id="resCategory">
                        <option value="">Category сонгоно уу</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Хаяг</label>
                    <input type="text" id="resAddress">
                </div>
                <div class="form-group">
                    <label>Ажиллах цаг</label>
                    <input type="text" id="resHours">
                </div>
                <div class="form-group">
                    <label>Хүргэлтийн хугацаа</label>
                    <input type="number" id="resTime">
                </div>
                <div class="form-group">
                    <label>Хүргэлтийн үнэ</label>
                    <input type="number" id="resFee">
                </div>
                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" step="0.1" id="resRating">
                </div>
                <div class="form-group full-width">
                    <label>Тайлбар</label>
                    <textarea id="resDesc"></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Зураг</label>
                    <input type="file" id="resImage">
                </div>
            </div>
            <div class="modal-footer-btns">
                <button class="btn-save" onclick="saveRestaurant()">
                    Save
                </button>
                <button class="btn-cancel" onclick="toggleModal(false)">
                    Cancel
                </button>
            </div>
        </div>
    </div>
    <script src="./js/restaurantlist.js"></script>
</body>
</html>
