<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management</title>
    <link rel="stylesheet" href="./css/restaurantlist.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="layout">
        <div class="layout-header">
            <h2>Order from <span id="resCount">0</span> places</h2>
        </div>

        <div class="layout-body">
            <div id="restaurantList" class="res-list-container">
                <!-- Рестораны картууд энд орно -->
            </div>
        </div>

        <div class="layout-footer">
            <button class="btn-add-main" onclick="toggleModal(true)">
                <i class="fas fa-plus"></i> Add New Restaurant
            </button>
        </div>
    </div>

    <!-- Ресторан нэмэх Модал -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="toggleModal(false)">
                <i class="fas fa-times"></i>
            </span>
            <h3>Шинэ ресторан нэмэх</h3>

            <div class="modal-form-grid">
                <div class="form-group">
                    <label>Нэр *</label>
                    <input type="text" id="resName" placeholder="Рестораны нэр">
                </div>
                <div class="form-group">
                    <label>Утас</label>
                    <input type="text" id="resPhone" placeholder="Утасны дугаар">
                </div>
                <div class="form-group full-width">
                    <label>Хаяг *</label>
                    <input type="text" id="resAddress" placeholder="Дүүрэг, хороо, гудамж...">
                </div>
                <div class="form-group">
                    <label>Ажиллах цаг</label>
                    <input type="text" id="resHours" placeholder="09:00 - 22:00">
                </div>
                <div class="form-group">
                    <label>Хүргэлтийн хугацаа (мин)</label>
                    <input type="number" id="resTime" placeholder="30">
                </div>
                <div class="form-group">
                    <label>Хүргэлтийн төлбөр (₮)</label>
                    <input type="number" id="resFee" placeholder="5000">
                </div>
                <div class="form-group">
                    <label>Үнэлгээ (Rating)</label>
                    <input type="number" id="resRating" step="0.1" min="0" max="5" placeholder="4.5">
                </div>
                <div class="form-group full-width">
                    <label>Тайлбар</label>
                    <textarea id="resDesc" rows="2" placeholder="Рестораны тухай товч..."></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Лого зураг сонгох</label>
                    <input type="file" id="resImage" accept="image/*">
                </div>
            </div>

            <div class="modal-footer-btns">
                <button class="btn-cancel" onclick="toggleModal(false)">Болих</button>
                <button class="btn-save" onclick="saveRestaurant()">Хадгалах</button>
            </div>
        </div>
    </div>

    <script src="./js/restaurantlist.js"></script>
</body>

</html>
